<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Digital Terpadu - SMP YASPI MEDAN</title>
    <style>
        :root {
            --primary: #0b6623;
            --primary-dark: #054416;
            --bg-main: #f7fafc;
            --text-main: #2d3748;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #133b22; background: linear-gradient(135deg, #133b22 0%, #1a4d2e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; width: 100%; max-width: 420px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; }
        .card-header { background: var(--primary); padding: 25px; text-align: center; color: white; }
        .card-header h2 { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
        .card-header p { font-size: 12px; opacity: 0.9; margin-top: 5px; background: #e9b824; color: #133b22; display: inline-block; padding: 3px 10px; border-radius: 20px; font-weight: bold; }
        .card-body { padding: 30px 25px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }
        .form-control { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; color: #4a5568; }
        .form-control:focus { border-color: var(--primary); }
        
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 6px rgba(11, 102, 35, 0.2); margin-top: 5px; }
        .btn-submit:hover { background: var(--primary-dark); }
        .btn-submit:disabled { background: #a0aec0; cursor: not-allowed; }
        .footer-text { text-align: center; margin-top: 25px; font-size: 11px; color: #718096; line-height: 1.5; border-top: 1px solid #edf2f7; padding-top: 15px; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="card-header">
        <h2>SMP YASPI MEDAN</h2>
        <p>PORTAL DIGITAL TERPADU (UNI-SISTEM 2026)</p>
    </div>
    <div class="card-body">
        <div class="form-group">
            <label>Pilih Kelas Anda:</label>
            <select id="txtPilihKelas" class="form-control" onchange="muatSiswaOtomatis()">
                <option value="">-- Pilih Kelas --</option>
                <option value="7-1">Kelas 7-1</option>
                <option value="7-2">Kelas 7-2</option>
                <option value="8-1">Kelas 8-1</option>
                <option value="8-2">Kelas 8-2</option>
                <option value="9-1">Kelas 9-1</option>
                <option value="9-2">Kelas 9-2</option>
            </select>
        </div>

        <div class="form-group">
            <label>Nama Lengkap Murid:</label>
            <select id="txtPilihNama" class="form-control" disabled style="background-color: #f7fafc;" onchange="deteksiSandiTersimpan()">
                <option value="">-- Pilih Kelas Terlebih Dahulu --</option>
            </select>
        </div>

        <div class="form-group">
            <label>Password Pengaman:</label>
            <input type="password" id="txtPasswordSiswa" class="form-control" placeholder="Masukkan sandi pencegah iseng">
        </div>

        <button id="btnProsesLogin" class="btn-submit" onclick="eksekusiLoginSiswa()">
            Masuk Aplikasi ➔
        </button>

        <div class="footer-text">
            <strong>Pesan Kepemimpinan:</strong><br>
            "Lewat integrasi iman, takwa, dan teknologi, kita buktikan SMP Yaspi Medan mampu mencetak generasi unggul!" — Pak Ifham Fuady Fasa, S.Pd (VM)
        </div>
    </div>
</div>

<script>
    const URL_DATABASE = "https://script.google.com/macros/s/AKfycbwDVTZZgCKMKA-dqFbZudnRpkw3I3AyBripPhfbD7dELsK05jhWPbxUnoI0PsZN9IdM/exec";

    // JIKA PERNAH MASUK DAN BELUM LOGOUT, LANGSUNG DIALIHKAN KE JURNAL SHOLAT
    window.addEventListener('DOMContentLoaded', function() {
        if (localStorage.getItem("siswa_sholat_session")) {
            window.location.href = "sholat.html";
        }
    });

    function muatSiswaOtomatis() {
        const kelas = document.getElementById("txtPilihKelas").value;
        const selectNama = document.getElementById("txtPilihNama");

        if (!kelas) {
            selectNama.innerHTML = '<option value="">-- Pilih Kelas Terlebih Dahulu --</option>';
            selectNama.disabled = true;
            selectNama.style.backgroundColor = "#f7fafc";
            return;
        }

        selectNama.innerHTML = '<option value="">🔄 Menghubungkan ke database...</option>';
        selectNama.disabled = true;

        fetch(URL_DATABASE + "?action=ambil_siswa&kelas=" + kelas)
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.length === 0) {
                selectNama.innerHTML = '<option value="">⚠️ Lembar data kosong / salah nama tab</option>';
                return;
            }
            let htmlOptions = '<option value="">-- Pilih Nama Anda --</option>';
            data.forEach(function(item) {
                htmlOptions += '<option value="' + item.nim + '">' + item.nama + '</option>';
            });
            selectNama.innerHTML = htmlOptions;
            selectNama.disabled = false;
            selectNama.style.backgroundColor = "#ffffff";
            
            // Cek sandi otomatis
            deteksiSandiTersimpan();
        })
        .catch(function(err) {
            alert("Gagal mengunduh daftar nama siswa. Periksa koneksi internet Anda.");
            selectNama.innerHTML = '<option value="">⚠️ Gagal memuat data siswa</option>';
        });
    }

    // FUNGSI UTAMAKAN KENYAMANAN: OTOMATIS MENGISI SANDI JIKA PERNAH BERHASIL LOGIN
    function deteksiSandiTersimpan() {
        const nimSelected = document.getElementById("txtPilihNama").value;
        const inputPass = document.getElementById("txtPasswordSiswa");
        
        if (!nimSelected) {
            inputPass.value = "";
            return;
        }
        
        const sandiLokal = localStorage.getItem("brankas_yaspi_" + nimSelected);
        if (sandiLokal) {
            inputPass.value = sandiLokal;
        } else {
            inputPass.value = "";
        }
    }

    // FUNGSI UTAMA LOGIN DENGAN PENGIRIMAN DATA GENDER (JK)
    function eksekusiLoginSiswa() {
        const kelas = document.getElementById("txtPilihKelas").value;
        const selectNamaEl = document.getElementById("txtPilihNama");
        const nim = selectNamaEl.value;
        const namaText = selectNamaEl.options[selectNamaEl.selectedIndex] ? selectNamaEl.options[selectNamaEl.selectedIndex].text : "";
        const password = document.getElementById("txtPasswordSiswa").value;
        const btn = document.getElementById("btnProsesLogin");

        if (!kelas || !nim || !password) {
            alert("Peringatan: Pilihan Kelas, Nama, dan Password tidak boleh kosong!");
            return;
        }

        btn.innerText = "⏳ Memvalidasi Keamanan...";
        btn.disabled = true;

        const postDataStr = "action=cek_login&kelas=" + encodeURIComponent(kelas) + "&nim=" + encodeURIComponent(nim) + "&password=" + encodeURIComponent(password);

        fetch(URL_DATABASE, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: postDataStr
        })
        .then(function(res) { return res.json(); })
        .then(function(hasilServer) {
            if (hasilServer.status === "sukses") {
                
                // 1. SIMPAN PASSWORD KE LOKAL HP/LAPTOP
                localStorage.setItem("brankas_yaspi_" + nim, password);

                // 2. KUNCI UTAMA: Bawa variabel .jk atau .JK dari server Google Sheets
                const payloadSesi = { 
                    nim: nim, 
                    nama: namaText, 
                    kelas: kelas,
                    jk: hasilServer.jk || hasilServer.JK || "L" // Fleksibel membaca jk huruf kecil maupun kapital dari Sheets
                };
                localStorage.setItem("siswa_sholat_session", JSON.stringify(payloadSesi));
                
                alert(hasilServer.pesan + " Selamat Datang, " + namaText + ".");
                window.location.href = "sholat.html";
            } else {
                alert("❌ LOGIN GAGAL: " + hasilServer.pesan);
                btn.innerText = "Masuk Aplikasi ➔";
                btn.disabled = false;
            }
        })
        .catch(function(err) {
            alert("Terjadi gangguan jaringan atau URL script belum di-deploy ulang. Sila periksa kembali.");
            btn.innerText = "Masuk Aplikasi ➔";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
