<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Jurnal Sholat Digital</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0f5132; --secondary: #198754; --bg: #f8f9fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--primary); padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-container { background: white; width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); padding: 25px; }
        .logo-box { text-align: center; margin-bottom: 20px; color: var(--primary); }
        .logo-box i { font-size: 50px; margin-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #333; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; }
        .form-control:focus { border-color: var(--secondary); }
        .btn-login { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-login:hover { background: var(--secondary); }
        .loading-text { display: none; text-align: center; color: var(--secondary); font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-box">
        <i class="fas fa-mosque"></i>
        <h2>SMP YASPI MEDAN</h2>
        <p style="font-size: 12px; color: #666;">Jurnal Mutabaah Sholat Digital</p>
    </div>

    <form id="form-login">
        <div class="form-group">
            <label>Pilih Kelas</label>
            <select class="form-control" id="select-kelas" required>
                <option value="">-- Pilih Kelas --</option>
                <option value="7A">Kelas 7A</option>
                <option value="7B">Kelas 7B</option>
                <option value="8A">Kelas 8A</option>
                <option value="8B">Kelas 8B</option>
                <option value="9A">Kelas 9A</option>
                <option value="9B">Kelas 9B</option>
            </select>
        </div>

        <div class="form-group">
            <label>Nama Siswa</label>
            <select class="form-control" id="select-siswa" required disabled>
                <option value="">-- Pilih Kelas Terlebih Dahulu --</option>
            </select>
        </div>

        <div class="form-group">
            <label>Password / PIN Akses</label>
            <input type="password" class="form-control" id="input-password" placeholder="Masukkan Password Anda" required>
        </div>

        <button type="submit" class="btn-login" id="btn-submit">MASUK JURNAL</button>
        <div class="loading-text" id="loader"><i class="fas fa-spinner fa-spin"></i> Memproses ke server...</div>
    </form>
</div>

<script>
    // ⚠️ GANTI DENGAN URL WEB APP HASIL DEPLOY BARU ANDA
    const URL_DATABASE = "URL_WEB_APP_ANDA_DI_SINI"; 

    // 1. Ambil daftar nama siswa saat kelas dipilih
    $("#select-kelas").change(function() {
        let kelasDipilih = $(this).val();
        if (!kelasDipilih) {
            $("#select-siswa").html('<option value="">-- Pilih Kelas Terlebih Dahulu --</option>').prop("disabled", true);
            return;
        }

        $("#select-siswa").html('<option value="">Memuat nama siswa...</option>').prop("disabled", true);

        $.get(URL_DATABASE, { action: "ambil_siswa", kelas: kelasDipilih }, function(data) {
            if (data && data.length > 0 && !data[0].error) {
                let opsi = '<option value="">-- Pilih Nama Anda --</option>';
                data.forEach(siswa => {
                    opsi += `<option value="${siswa.nim}">${siswa.nama}</option>`;
                });
                $("#select-siswa").html(opsi).prop("disabled", false);
            } else {
                $("#select-siswa").html('<option value="">Gagal memuat data / Kelas kosong</option>');
            }
        }, "json").fail(function() {
            $("#select-siswa").html('<option value="">Gagal terhubung ke server</option>');
        });
    });

    // 2. Proses Verifikasi Login Form
    $("#form-login").submit(function(e) {
        e.preventDefault();
        
        let kelas = $("#select-kelas").val();
        let nim = $("#select-siswa").val();
        let nama = $("#select-siswa option:selected").text();
        let password = $("#input-password").val();

        $("#btn-submit").prop("disabled", true);
        $("#loader").show();

        $.post(URL_DATABASE, {
            action: "cek_login",
            kelas: kelas,
            nim: nim,
            password: password
        }, function(res) {
            $("#btn-submit").prop("disabled", false);
            $("#loader").hide();

            if (res.status === "sukses") {
                // Simpan identitas sukses ke memori HP siswa
                let sesiUser = { kelas: kelas, nim: nim, nama: nama, jk: res.jk };
                localStorage.setItem("user_sholat", JSON.stringify(sesiUser));
                
                // Pindah ke halaman pengisian sholat
                window.location.href = "sholat.html";
            } else {
                alert("Verifikasi Gagal: " + res.pesan);
            }
        }, "json").fail(function() {
            $("#btn-submit").prop("disabled", false);
            $("#loader").hide();
            alert("Koneksi server bermasalah.");
        });
    });
</script>
</body>
</html>
