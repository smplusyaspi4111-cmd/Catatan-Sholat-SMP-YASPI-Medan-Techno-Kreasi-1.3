<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // URL SCRIPT WEB APP BAPAK YANG SUDAH DIPERBARUI
        const API_URL = "https://script.google.com/macros/s/AKfycbyyq2-PBFrD4w5tDTElvi-niGCQF-ajlZ2X0eLwtUSjvpBZih18UttphnVpFfkpS89eDw/exec";

        let currentNIM = "2000";
        let currentGender = "L";
        let databaseJadwal = { "S": "05:01", "Z": "12:28", "A": "15:55", "M": "18:37", "I": "19:52" };

        function perbaruiJamDanTanggal() {
            try {
                const sekarang = new Date();
                let jam = String(sekarang.getHours()).padStart(2, '0');
                let menit = String(sekarang.getMinutes()).padStart(2, '0');
                let detik = String(sekarang.getSeconds()).padStart(2, '0');
                document.getElementById("txtJam").innerText = jam + ":" + menit + ":" + detik;
                
                const opsiTgl = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById("txtTanggal").innerText = sekarang.toLocaleDateString('id-ID', opsiTgl);
            } catch (e) {
                console.log("Error clock update: ", e);
            }
        }

        perbaruiJamDanTanggal();
        setInterval(perbaruiJamDanTanggal, 1000);

        window.addEventListener('DOMContentLoaded', () => {
            perbaruiJamDanTanggal();

            const sessionRaw = localStorage.getItem("siswa_login") || localStorage.getItem("Siswa_Login") || localStorage.getItem("siswa");
            
            if (sessionRaw) {
                try {
                    const dataSiswa = JSON.parse(sessionRaw);
                    currentNIM = dataSiswa.nim || dataSiswa.NIM || "2000";
                    currentGender = (dataSiswa.gender || dataSiswa.jk || dataSiswa.JenisKelamin || "L").toUpperCase().trim();

                    document.getElementById("lblNama").innerText = dataSiswa.nama || dataSiswa.Nama || "Siswa Aktif";
                    document.getElementById("lblNIM").innerText = currentNIM;
                    document.getElementById("lblKelas").innerText = dataSiswa.kelas || dataSiswa.Kelas || "7-1";
                } catch(err) {
                    buatDataDummyUjiCoba();
                }
            } else {
                buatDataDummyUjiCoba();
            }

            document.getElementById("badgeGender").innerText = currentGender === "P" ? "SISWI (PEREMPUAN)" : "SISWA (LAKI-LAKI)";
            if (currentGender === "P") {
                document.getElementById("areaUdzur").style.display = "block";
            }

            muatStatusTombolHarian();
        });

        function buatDataDummyUjiCoba() {
            document.getElementById("lblNama").innerText = "Siswa Pengetesan (Silakan Klik)";
            document.getElementById("lblNIM").innerText = currentNIM;
            document.getElementById("lblKelas").innerText = "7-1";
        }

        function muatStatusTombolHarian() {
            const listKode = ["S", "Z", "A", "M", "I"];
            
            listKode.forEach(kode => {
                const containerBtn = document.getElementById("btn-container-" + kode);
                const localStatus = localStorage.getItem(`status_${currentNIM}_${kode}_${getTanggalHariIni()}`);
                const statusBadge = document.getElementById("status-" + kode);

                if (localStatus) {
                    const parsed = JSON.parse(localStatus);
                    statusBadge.innerText = parsed.teks;
                    statusBadge.className = `badge status-pill ${parsed.warnaBadge}`;
                    containerBtn.innerHTML = `<span class="badge badge-kunci"><i class="fa-solid fa-lock me-1"></i> Terkunci (${parsed.jam})</span>`;
                } else {
                    statusBadge.innerText = "Belum Diisi";
                    statusBadge.className = "badge bg-secondary status-pill";

                    if (currentGender === "L") {
                        containerBtn.innerHTML = `
                            <button class="btn btn-sm btn-sholat btn-jamaah" onclick="prosesKlaim('${kode}', 'BERJAMAAH', 'blue')">Jamaah</button>
                            <button class="btn btn-sm btn-sholat btn-awal" onclick="prosesKlaim('${kode}', 'AWAL WAKTU', 'awal')">Awal</button>
                            <button class="btn btn-sm btn-sholat btn-tengah" onclick="prosesKlaim('${kode}', 'PERTENGAHAN', 'yellow')">Tengah</button>
                            <button class="btn btn-sm btn-sholat btn-akhir" onclick="prosesKlaim('${kode}', 'AKHIR WAKTU', 'red')">Akhir</button>
                        `;
                    } else {
                        containerBtn.innerHTML = `
                            <button class="btn btn-sm btn-sholat btn-awal" onclick="prosesKlaim('${kode}', 'AWAL WAKTU', 'awal')">Awal</button>
                            <button class="btn btn-sm btn-sholat btn-tengah" onclick="prosesKlaim('${kode}', 'PERTENGAHAN', 'yellow')">Tengah</button>
                            <button class="btn btn-sm btn-sholat btn-akhir" onclick="prosesKlaim('${kode}', 'AKHIR WAKTU', 'red')">Akhir</button>
                        `;
                    }
                }
            });
        }

        function prosesKlaim(kodeSholat, tipeKlaim, payloadWarna) {
            const sekarang = new Date();
            let jamKlikMenit = String(sekarang.getHours()).padStart(2, '0') + ":" + String(sekarang.getMinutes()).padStart(2, '0');

            if (!confirm(`Apakah kamu yakin melapor bahwa kamu sholat ${tipeKlaim}? Data yang dikunci tidak bisa diubah!`)) {
                return;
            }

            var loader = new bootstrap.Modal(document.getElementById('loadingModal'));
            loader.show();

            const dataKirim = {
                action: "simpan_sholat",
                nim: currentNIM,
                sholat: kodeSholat,
                jam: jamKlikMenit,
                warna: payloadWarna
            };

            // PERBAIKAN LOGIKA: Hanya mengunci tombol jika server memberikan respon SUKSES asli
            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(dataKirim)
            })
            .then(res => res.json())
            .then(data => {
                loader.hide();
                if (data.status === "sukses") {
                    kunciTombolLokal(kodeSholat, tipeKlaim, jamKlikMenit, payloadWarna);
                    alert(data.pesan || "Berhasil! Laporan sholat Anda telah terkirim ke server.");
                } else {
                    alert("Gagal menyimpan ke server: " + (data.pesan || "Terjadi kesalahan backend."));
                }
            })
            .catch(err => {
                loader.hide();
                console.error("Fetch Error: ", err);
                alert("Gagal mengirim data! Silakan periksa kembali Deployment Web App Google Anda.");
            });
        }

        function kunciTombolLokal(kodeSholat, tipeKlaim, jamKlikMenit, payloadWarna) {
            let kelasBadge = "bg-success";
            if(payloadWarna === "blue") kelasBadge = "bg-primary";
            if(payloadWarna === "yellow") kelasBadge = "bg-warning text-dark";
            if(payloadWarna === "red") kelasBadge = "bg-danger";
            if(payloadWarna === "awal") kelasBadge = "bg-success";

            const detailKunci = { teks: tipeKlaim, jam: jamKlikMenit, warnaBadge: kelasBadge };
            localStorage.setItem(`status_${currentNIM}_${kodeSholat}_${getTanggalHariIni()}`, JSON.stringify(detailKunci));
            muatStatusTombolHarian();
        }

        function klaimUdzurSyari() {
            if (!confirm("Apakah kamu benar sedang berhalangan hari ini? Seluruh waktu sholat hari ini akan dikunci.")) {
                return;
            }

            var loader = new bootstrap.Modal(document.getElementById('loadingModal'));
            loader.show();

            const listKode = ["S", "Z", "A", "M", "I"];
            let suksesCount = 0;
            let failedFlag = false;

            listKode.forEach((kode) => {
                const dataKirim = {
                    action: "simpan_sholat",
                    nim: currentNIM,
                    sholat: kode,
                    jam: databaseJadwal[kode], 
                    warna: "abu"
                };

                fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(dataKirim)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === "sukses") {
                        const detailKunci = { teks: "UDZUR SYAR'I", jam: databaseJadwal[kode], warnaBadge: "bg-secondary" };
                        localStorage.setItem(`status_${currentNIM}_${kode}_${getTanggalHariIni()}`, JSON.stringify(detailKunci));
                        suksesCount++;
                    } else {
                        failedFlag = true;
                    }
                })
                .catch(() => {
                    failedFlag = true;
                })
                .finally(() => {
                    if ((suksesCount + (failedFlag ? 1 : 0)) === 5) {
                        loader.hide();
                        if (failedFlag && suksesCount < 5) {
                            alert("Beberapa data udzur gagal masuk ke server, mohon cek deployment Apps Script Bapak.");
                        } else {
                            alert("Status Udzur Syar'i berhasil disimpan ke server!");
                        }
                        muatStatusTombolHarian();
                    }
                });
            });
        }

        function getTanggalHariIni() {
            const d = new Date();
            return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
        }

        function logout() {
            if(confirm("Apakah anda ingin keluar?")) {
                localStorage.removeItem("siswa_login");
                window.location.href = "index.html";
            }
        }
    </script>
