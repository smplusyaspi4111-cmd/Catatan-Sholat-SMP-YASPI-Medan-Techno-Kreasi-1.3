<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Sholat Digital - SMP Yaspi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0f5132; --secondary: #198754; --bg: #f8f9fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--primary); padding: 15px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 500px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; position: relative; }
        .btn-logout { position: absolute; right: 15px; top: 20px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .profile-box { background: var(--bg); padding: 15px; margin: 15px; border-radius: 10px; border-left: 5px solid var(--secondary); font-size: 14px; }
        .profile-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .profile-val { font-weight: bold; color: var(--primary); }
        .sholat-card { background: white; margin: 0 15px 15px 15px; padding: 15px; border-radius: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
        .sholat-title { font-size: 15px; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: #e9ecef; }
        .grid-tombol { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .btn-poin { border: none; padding: 12px 5px; text-align: center; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; font-size: 11px; transition: 0.2s; }
        .btn-poin span { display: block; font-size: 9px; font-weight: normal; margin-top: 2px; opacity: 0.9; }
        .uzur { background: #6c757d; } .awal { background: #198754; } .akhir { background: #ffc107; color: #000; } .telat { background: #dc3545; }
        .btn-poin:disabled { opacity: 0.4; cursor: not-allowed; }
        .skor-box { background: #e8f5e9; margin: 15px; padding: 15px; border-radius: 10px; border: 2px dashed #198754; text-align: center; }
        .skor-angka { font-size: 36px; font-weight: bold; color: #198754; margin: 5px 0; }
        .footer-text { text-align: center; padding: 15px; font-size: 11px; color: rgba(255,255,255,0.7); }
        .loading-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; color:white; z-index:999; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loading"><i class="fas fa-spinner fa-spin fa-2x"></i>&nbsp;&nbsp;Memproses data...</div>

<div class="app-container">
    <div class="header">
        <h3>JURNAL SHOLAT DIGITAL</h3>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Keluar</button>
    </div>

    <div class="profile-box">
        <div class="profile-row"><span>Nama Siswa :</span><span class="profile-val" id="lbl-nama">-</span></div>
        <div class="profile-row"><span>Nomor NIM :</span><span class="profile-val" id="lbl-nim">-</span></div>
        <div class="profile-row"><span>Kelas / Grup :</span><span class="profile-val" id="lbl-kelas">-</span></div>
        <div class="profile-row"><span>Hari / Tanggal :</span><span id="lbl-tanggal" style="font-weight:500; color:#555;">-</span></div>
    </div>

    <!-- DAFTAR SHOLAT -->
    <div id="container-sholat"></div>

    <!-- TOTAL SKOR -->
    <div class="skor-box">
        <p style="font-size:12px; font-weight:bold; color:#555;">TOTAL SKOR KEDISIPLINAN HARI INI</p>
        <div class="skor-angka" id="total-skor">0</div>
        <p style="font-size:10px; color:#666;">Maksimal 100 poin per hari melalui validasi server Google Sheets</p>
    </div>
    
    <p class="footer-text">SMP YASPI MEDAN UNI-SISTEM © 2026</p>
</div>

<script>
    // ⚠️ GANTI DENGAN URL WEB APP HASIL DEPLOY BARU ANDA
    const URL_DATABASE = "URL_WEB_APP_ANDA_DI_SINI"; 

    const listWaktu = [
        { id: "S", nama: "Subuh", jam: "05.00 - 06.00" },
        { id: "Z", nama: "Zuhur", jam: "12.30 - 15.00" },
        { id: "A", nama: "Asar", jam: "15.45 - 18.00" },
        { id: "M", nama: "Magrib", jam: "18.45 - 19.45" },
        { id: "I", nama: "Isya", jam: "20.00 - 23.00" }
    ];

    let dataUser = JSON.parse(localStorage.getItem("user_sholat"));
    let skorLokal = JSON.parse(localStorage.getItem("skor_hari_ini_" + dataUser?.nim)) || {};

    if (!dataUser) { logout(); }

    $(document).ready(function() {
        // Tampilkan Identitas Siswa
        $("#lbl-nama").text(dataUser.nama.toUpperCase());
        $("#lbl-nim").text(dataUser.nim);
        $("#lbl-kelas").text("Kelas " + dataUser.kelas);
        
        // Atur Tanggal Hari Ini di Tampilan Web
        let opsi = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        $("#lbl-tanggal").text(new Date().toLocaleDateString('id-ID', opsi));

        renderCardSholat();
        hitungTotalSkor();
    });

    function renderCardSholat() {
        let html = "";
        listWaktu.forEach(w => {
            let statusSelesai = skorLokal[w.id] ? `Selesai <i class="fas fa-check-circle"></i> (${skorLokal[w.id].jam})` : "Belum Diisi";
            let statusBadgeColor = skorLokal[w.id] ? "background:#d1e7dd; color:#0f5132;" : "background:#e9ecef; color:#333;";
            let isDisable = skorLokal[w.id] ? "disabled" : "";
            let isUzurDisable = (dataUser.jk === "L" || skorLokal[w.id]) ? "disabled" : "";

            html += `
            <div class="sholat-card">
                <div class="sholat-title">
                    <span>${w.nama} <span style="font-size:12px; font-weight:normal; color:#666;">(${w.jam})</span></span>
                    <span class="status-badge" style="${statusBadgeColor}">${statusSelesai}</span>
                </div>
                <div class="grid-tombol">
                    <button class="btn-poin uzur" ${isUzurDisable} onclick="simpanSiswa('${w.id}', 20, 'Uzur')">Uzur/Haid<span>Poin 20</span></button>
                    <button class="btn-poin awal" ${isDisable} onclick="simpanSiswa('${w.id}', 15, 'Awal')">Awal Waktu<span>Poin 15</span></button>
                    <button class="btn-poin akhir" ${isDisable} onclick="simpanSiswa('${w.id}', 10, 'Akhir')">Akhir Waktu<span>Poin 10</span></button>
                    <button class="btn-poin telat" ${isDisable} onclick="simpanSiswa('${w.id}', 5, 'Terlambat')">Terlambat<span>Poin 5</span></button>
                </div>
            </div>`;
        });
        $("#container-sholat").html(html);
    }

    function hitungTotalSkor() {
        let total = 0;
        listWaktu.forEach(w => {
            if (skorLokal[w.id]) { total += skorLokal[w.id].poin; }
        });
        $("#total-skor").text(total);
        return total;
    }

    function simpanSiswa(waktuId, poinKlik, namaStatus) {
        let d = new Date();
        let jamMenit = String(d.getHours()).padStart(2, '0') + "." + String(d.getMinutes()).padStart(2, '0');
        
        // Simpan sementara di memori web lokal untuk kalkulasi skor total terbaru
        skorLokal[waktuId] = { poin: poinKlik, jam: jamMenit };
        let totalSkorKirim = hitungTotalSkor();

        $("#loading").css("display", "flex");

        // Kirim data lengkap ke Google Sheets
        $.ajax({
            url: URL_DATABASE,
            type: "POST",
            dataType: "json",
            data: {
                action: "simpan_sholat",
                kelas: dataUser.kelas,
                nim: dataUser.nim,
                password: waktuId, // Mengirim parameter pengenal kode S, Z, A, M, I
                jam: jamMenit,
                total_skor: totalSkorKirim // KUNCI UTAMA: Mengirimkan akumulasi skor (55, dll) langsung ke Sheets
            },
            success: function(res) {
                $("#loading").hide();
                if (res.status === "sukses") {
                    localStorage.setItem("skor_hari_ini_" + dataUser.nim, JSON.stringify(skorLokal));
                    alert("Berhasil menyimpan data sholat " + waktuId);
                    renderCardSholat();
                } else {
                    delete skorLokal[waktuId]; // batalkan jika gagal di server
                    hitungTotalSkor();
                    alert("Gagal menyimpan: " + res.pesan);
                }
            },
            error: function() {
                $("#loading").hide();
                delete skorLokal[waktuId];
                hitungTotalSkor();
                alert("Gagal terhubung ke Cloud Server. Periksa koneksi internet Anda.");
            }
        });
    }

    function logout() {
        localStorage.removeItem("user_sholat");
        window.location.href = "index.html";
    }
</script>
</body>
</html>
